<div class="content-header pb-0">
  <div class="container-fluid">
    <div class="row mb-2">
      <div class="col-sm-12">
        <h5 class="m-0 font-weight-bold">
          <i class="fas fa-file-signature text-maroon mr-2"></i>Unggah SK Pembagian Tugas
        </h5>
        <hr class="mt-2 mb-3" style="border-top: 2px solid #800000;">
      </div>
    </div>
  </div>
</div>

<section class="content">
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-md-10" style="max-width: 900px;">
        
        <div class="glass-panel shadow-sm" style="padding: 15px 20px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 15px; border-left: 4px solid #800000; background: rgba(128, 0, 0, 0.05); border-radius: 8px;">
            <i class="fas fa-info-circle" style="font-size: 1.3em; color: #800000; margin-top: 2px;"></i>
            <div>
                <h4 style="margin: 0 0 5px 0; color: #333; font-size: 14px; font-weight: 600;">Petunjuk Pengisian</h4>
                <p style="margin: 0; color: #555; font-size: 13px; line-height: 1.4;">
                    Silakan lengkapi data SK Pembagian Tugas di bawah ini. Pastikan file yang diunggah adalah scan dokumen asli yang sudah ditandatangani berformat <b>PDF</b> dengan ukuran maksimal <b>1 MB</b>. Seluruh kolom wajib diisi.
                </p>
            </div>
        </div>

        <div class="card shadow">
          <div class="card-header" style="background-color: #c82333; color: white;">
            <h3 class="card-title font-weight-bold">Formulir Pengajuan Dokumen</h3>
          </div>
          
          <form id="formUnggahSk">
            <div class="card-body">
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Nama Sekolah</label>
                    <select class="form-control select2" id="namaSd" name="namaSd" required></select>
                  </div>
                  
                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-group">
                        <label>Tahun Ajaran</label>
                        <select class="form-control" id="tahunAjaran" name="tahunAjaran" required></select>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group">
                        <label>Semester</label>
                        <select class="form-control" id="semester" name="semester" required></select>
                      </div>
                    </div>
                  </div>

                  <div class="form-group">
                    <label>Kriteria SK</label>
                    <select class="form-control" id="kriteriaSk" name="kriteriaSk" required></select>
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group">
                    <label>Nomor SK</label>
                    <input type="text" class="form-control" id="nomorSk" placeholder="800/..." required>
                  </div>

                  <div class="form-group">
                    <label>Tanggal SK</label>
                    <input type="date" class="form-control" id="tanggalSk" required>
                  </div>

                  <div class="form-group">
                    <label>Unggah Dokumen</label>
                    <div class="custom-file">
                      <input type="file" class="custom-file-input" id="fileSk" accept="application/pdf" required>
                      <label class="custom-file-label" for="fileSk">Pilih berkas PDF...</label>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card-footer bg-white border-top-0">
              <button type="submit" class="btn px-4 font-weight-bold shadow bg-gradient-danger float-right" 
                      style="border: none; color: white; height: 38px;" id="btnKirim">
                <i class="fas fa-paper-plane mr-2"></i> KIRIM DOKUMEN
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  $(document).ready(function () {
    // Inisialisasi data dropdown
    renderDropdown("namaSd", "NamaSD");
    renderDropdown("tahunAjaran", "TahunAjaran");
    renderDropdown("semester", "Semester");
    renderDropdown("kriteriaSk", "KriteriaSK");

    if (typeof bsCustomFileInput !== 'undefined') {
      bsCustomFileInput.init();
    }

    $('#formUnggahSk').on('submit', function (e) {
      e.preventDefault();
      handleUpload();
    });
  });

  function handleUpload() {
  // 1. Ambil File
  const fileInput = $('#fileSk')[0].files[0];
  if (!fileInput) return; // Batal kalau tidak ada file

  // 2. Cek Siapa yang Login (Ambil dari Langkah 2 tadi)
  const myUsername = localStorage.getItem('username'); 
  
  // Kalau memori kosong (belum login), tolak!
  if (!myUsername) {
    NotifSultan.alert('error', 'SESI HABIS', 'Silakan Logout lalu Login kembali.');
    return;
  }

  // 3. Validasi File (Ukuran 1MB)
  if (fileInput.size > 1024 * 1024) {
    NotifSultan.alert('error', 'GAGAL', 'Ukuran file terlalu besar! Maksimal 1 MB.');
    return;
  }

  // 4. Mulai Loading
  NotifSultan.loading("Sedang Mengunggah...");

  // 5. Proses Baca File & Kirim
  const reader = new FileReader();
  reader.onload = function (e) {
    const bytes = e.target.result.split(',')[1];
    
    // Siapkan Paket Data
    const payload = {
      namaSd: $('#namaSd').val(),
      tahunAjaran: $('#tahunAjaran').val(),
      semester: $('#semester').val(),
      kriteriaSk: $('#kriteriaSk').val(),
      nomorSk: $('#nomorSk').val(),
      tanggalSk: $('#tanggalSk').val(),
      fileData: bytes,
      
      // INI PENTING: Kirim "55555" ke Server
      username: myUsername 
    };

    // Kirim ke code.gs
    google.script.run
      .withSuccessHandler(function (res) {
        if (res.success) {
          // Kalau sukses, muncul notif lalu pindah halaman
          NotifSultan.alert('success', 'BERHASIL', res.message).then(() => {
            loadPage('sk_dashboard'); 
          });
        } else {
          NotifSultan.alert('error', 'GAGAL', res.message);
        }
      })
      .prosesUnggahSK(payload);
  };
  reader.readAsDataURL(fileInput);
}
</script>
